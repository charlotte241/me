<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Body Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="site-header">
      <div class="header-inner">
        <div class="wordmark">Body Intelligence</div>
        <div id="header-meta" class="header-meta"></div>
      </div>
    </header>

    <nav id="main-nav">
      <div class="nav-inner">
        <button class="nav-item active" data-view="today">Today</button>
        <button class="nav-item" data-view="log">Log</button>
        <button class="nav-item" data-view="scale">Scale</button>
        <button class="nav-item" data-view="insights">Insights</button>
        <button class="nav-item" data-view="week">Week</button>
      </div>
    </nav>

    <main id="main-content">
      <!-- Rendered by JS -->
    </main>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
